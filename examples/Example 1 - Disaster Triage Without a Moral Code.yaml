validity_gate_reminder:
  note: >
    This example remains valid only as a scene-bound PMS application. It does not
    license verdicts, prescriptions, person-ranking, or irreversible identity claims.
  requires:
    - id: "Χ"
      name: "Distance"
      meaning: >
        Maintain meta-position and stop-capability; no fusion into verdict,
        authority, or normative demand.
    - id: "reversibility"
      meaning: >
        All readings remain scene-bound, revisable, and configuration-specific;
        no global person labels or irreversible interpretive claims.
    - id: "D"
      name: "Dignity-in-practice"
      meaning: >
        No shaming, ranking, humiliation, or ontological person evaluation;
        critique remains restricted to structural attribution and boundary handling.

model_binding:
  source_profile:
