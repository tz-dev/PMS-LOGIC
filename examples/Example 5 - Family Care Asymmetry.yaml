#
#    - PMS-LOGIC.yaml (schema_version: PMS-LOGIC_1.1)
#    - PMS.yaml       (schema_version: PMS_1.3)
#
#  It is not a family ethics manual, not a caregiving prescription, and not a
#  moral code. Its function is to render a concrete care scene operator-readable
#  under the PMS-LOGIC lens while preserving:
#
#    - Distance (Χ),
#    - reversibility,
#    - Dignity-in-Practice (D),
#    - non-prescriptivity,
#    - and strict responsibility/ought separation.
#
# -----------------------------------------------------------------------------
#  EXAMPLE TYPE
# -----------------------------------------------------------------------------
#  Scene-bound, non-instructional, structurally reconstructive.
#
# =============================================================================

